<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>סורק וידאו - בדיקה עמוקה</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui; background: #0f172a; color: white; padding: 20px; max-width: 800px; margin: auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input[type="date"] { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; border: none; padding: 12px; border-radius: 6px; font-weight: bold; width: 100%; transition: 0.2s; }
        #startBtn { background: #3ecf8e; color: #0f172a; font-size: 16px; }
        #startBtn:disabled { background: #475569; cursor: not-allowed; }
        #results { margin-top: 20px; display: grid; gap: 10px; }
        .video-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1e293b; border-radius: 8px; border-right: 4px solid #475569; }
        .video-row.open { border-right-color: #10b981; }
        .video-row.blocked { border-right-color: #ef4444; background: #2d1a1a; }
        .video-link { color: #60a5fa; text-decoration: none; font-weight: bold; }
        .video-link:hover { text-decoration: underline; }
        #hidden-checker { position: absolute; left: -9999px; top: -9999px; width: 1px; height: 1px; overflow: hidden; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; font-size: 14px; color: #94a3b8; }
        b { color: #3ecf8e; }
    </style>
</head>
<body>

    <h2>סורק נטפרי - בדיקה עמוקה (HTML)</h2>

    <div class="card">
        <div class="grid">
            <div>
                <label>מתאריך:</label>
                <input type="date" id="startDate">
            </div>
            <div>
                <label>עד תאריך:</label>
                <input type="date" id="endDate">
            </div>
        </div>
        <button id="startBtn">טוען נגן יוטיוב...</button>
    </div>

    <div class="stats" id="statsArea" style="display:none;">
        <span>זמן ממוצע: <b id="avgTime">0</b>s</span>
        <span>נותרו: <b id="timeLeft">0</b> סרטונים</span>
    </div>

    <div id="results"></div>

    <div id="hidden-checker"></div>

    <script>
      // ==========================================
// הגדרות בסיס וחיבור לסופבייס עם קוד אדמין
// ==========================================
const SUPABASE_URL = 'https://fbzewdfubjfhqvlusyrj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2JftgVsArBG2NB-RXp0q4Q_jdd8VfPO';
const ADMIN_SECRET_CODE = '7789'; // הקוד שחובה לשלוח ב-Header

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    global: {
        headers: { 'x-admin-code': ADMIN_SECRET_CODE }
    }
});
        let isYTReady = false;
        const videoCache = {};

        // 1. טעינת ה-API של יוטיוב
        function onYouTubeIframeAPIReady() {
            isYTReady = true;
            document.getElementById('startBtn').innerText = "התחל בדיקה";
        }

        // 2. בדיקת תמונה מהירה (כפי שהבאת בקוד)
        function quickImageCheck(videoId) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(true); // תמונה קיימת = כנראה פתוח
                img.onerror = () => resolve(false); // תמונה חסומה = חסום בנטפרי
                img.src = `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
            });
        }

        // 3. בדיקת נגן עמוקה (כפי שהבאת בקוד)
        function deepPlayerCheck(videoId) {
            return new Promise((resolve) => {
                const divId = `check-${videoId}`;
                const checkDiv = document.createElement('div');
                checkDiv.id = divId;
                document.getElementById('hidden-checker').appendChild(checkDiv);

                let hasResolved = false;

                const player = new YT.Player(divId, {
                    videoId: videoId,
                    playerVars: { 'autoplay': 1, 'mute': 1, 'origin': window.location.origin },
                    events: {
                        'onReady': (e) => e.target.playVideo(),
                        'onStateChange': (e) => {
                            // מצב 1 (PLAYING) או 3 (BUFFERING) נחשבים כפתוחים
                            if (!hasResolved && (e.data === 1 || e.data === 3)) {
                                hasResolved = true;
                                cleanup(true);
                            }
                        },
                        'onError': () => {
                            if (!hasResolved) {
                                hasResolved = true;
                                cleanup(false);
                            }
                        }
                    }
                });

                const timeout = setTimeout(() => {
                    if (!hasResolved) {
                        hasResolved = true;
                        cleanup(false);
                    }
                }, 6000);

                function cleanup(isOpen) {
                    clearTimeout(timeout);
                    try { player.destroy(); document.getElementById(divId)?.remove(); } catch(e) {}
                    resolve(isOpen);
                }
            });
        }

        // 4. הרצת התהליך המרכזי
        document.getElementById('startBtn').onclick = async () => {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (!start || !end) return alert("בחר תאריכים");
            if (!isYTReady) return alert("הנגן נטען, המתן שניה");

            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            document.getElementById('statsArea').style.display = "flex";
            document.getElementById('results').innerHTML = "";

            // שליפה מ-Supabase
            const { data: videos, error } = await supabaseClient.from('videos')
                .select('id, title')
                .gte('added_at', start + 'T00:00:00Z')
                .lte('added_at', end + 'T23:59:59Z');

            if (error || !videos.length) {
                alert("לא נמצאו סרטונים");
                startBtn.disabled = false;
                return;
            }

            let totalTime = 0;

            for (let i = 0; i < videos.length; i++) {
                const v = videos[i];
                const startTime = Date.now();
                
                startBtn.innerText = `בודק ${i + 1} מתוך ${videos.length}...`;
                document.getElementById('timeLeft').innerText = videos.length - i;

                // אסטרטגיית הבדיקה מהקוד שלך:
                // א. בדיקת תמונה מהירה
                const isImageOpen = await quickImageCheck(v.id);
                let finalStatus = false;

                if (isImageOpen) {
                    // ב. אם התמונה פתוחה, מבצעים בדיקת נגן לוודא סופית
                    finalStatus = await deepPlayerCheck(v.id);
                }

                // עדכון זמנים
                const duration = (Date.now() - startTime) / 1000;
                totalTime += duration;
                document.getElementById('avgTime').innerText = (totalTime / (i+1)).toFixed(1);

                renderResult(v, finalStatus);
            }

            startBtn.disabled = false;
            startBtn.innerText = "הבדיקה הסתיימה!";
        };

        function renderResult(video, isOpen) {
            const row = document.createElement('div');
            row.className = `video-row ${isOpen ? 'open' : 'blocked'}`;
            row.innerHTML = `
                <div>
                    <a href="https://youtube.com/watch?v=${video.id}" target="_blank" class="video-link">
                        ${video.title || 'ללא כותרת'}
                    </a>
                    <div style="font-size:11px; color:#94a3b8;">${video.id}</div>
                </div>
                <b>${isOpen ? '✅' : '🛑'}</b>
            `;
            document.getElementById('results').prepend(row);
        }
    </script>
</body>
</html>
